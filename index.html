<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link id="app-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script>
    // Crop icon symbol only (excluding text/name) from the navbar logo for favicon
    (function () {
      var img = new Image();
      img.crossOrigin = 'Anonymous';
      img.onload = function () {
        try {
          var canvas = document.createElement('canvas');
          var ctx = canvas.getContext('2d');
          var iconWidth = img.height * 1.02; // Tighter crop focusing strictly on the icon
          canvas.width = 128;
          canvas.height = 128;
          // Scale up even more so icon fills edge-to-edge in the tab
          ctx.drawImage(img, 0, 0, iconWidth, img.height, -14, -14, 156, 156);
          var faviconLink = document.getElementById('app-favicon');
          if (faviconLink) {
            faviconLink.href = canvas.toDataURL('image/png');
            faviconLink.type = 'image/png';
          }
        } catch (e) {
          console.error('Favicon crop error:', e);
        }
      };
      img.src = '/New-Logo-2.png';
    })();
  </script>
  <!-- Existing CSS files ke baad -->
  <link rel="stylesheet" href="path/to/lumira-theme.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodhi Bridal</title>
  <script>
    //  Fix for HashRouter OAuth Redirects
    (function () {
      var path = window.location.pathname;
      if (path.includes('/auth/linkedin/callback')) {
        var search = window.location.search;
        var hash = window.location.hash;
        var newUrl = window.location.origin + '/#/' + path.replace(/^\//, '') + search + hash;
        console.log('🔄 Redirecting to hash route:', newUrl);
        window.location.replace(newUrl);
      }
    })();
  </script>
</head>
